<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" fill="none">
  <defs>
    <!-- Main brand gradient: deep purple → coral → orange -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B21A8"/>
      <stop offset="45%"  stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <!-- Sun gradient -->
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <!-- Smile gradient -->
    <linearGradient id="smile" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- ── Sun rays (above the J dot area) ── -->
  <g transform="translate(210, 18)" stroke="url(#sun)" stroke-width="2.5" stroke-linecap="round">
    <line x1="0"  y1="-11" x2="0"  y2="-16"/>
    <line x1="7"  y1="-8"  x2="10" y2="-12" transform="rotate(0)"/>
    <line x1="-7" y1="-8"  x2="-10" y2="-12"/>
    <line x1="11" y1="-2"  x2="15"  y2="-2"/>
    <line x1="-11" y1="-2" x2="-15" y2="-2"/>
    <line x1="7"  y1="5"   x2="10"  y2="8"/>
    <line x1="-7" y1="5"   x2="-10" y2="8"/>
  </g>
  <!-- Sun circle -->
  <circle cx="210" cy="18" r="7" fill="url(#sun)" opacity="0.92"/>

  <!-- ── Wordmark: A-Joy ── -->
  <text
    x="12" y="82"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="url(#brand)"
    letter-spacing="-2"
  >A-Joy</text>

  <!-- ── Smile arc ── -->
  <path
    d="M 52 96 Q 130 118 210 96"
    stroke="url(#smile)"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
  />
</svg>
